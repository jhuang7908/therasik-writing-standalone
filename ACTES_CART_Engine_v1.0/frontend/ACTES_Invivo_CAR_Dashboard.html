<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTES In-Vivo CAR Design Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --accent-cyan: #22d3ee;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glow-cyan: 0 0 15px rgba(34, 211, 238, 0.4);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(34, 211, 238, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            height: 100vh;
            gap: 1px;
            background: var(--border-glass);
        }

        /* Sidebar - Component Library */
        .sidebar {
            background: var(--bg-dark);
            padding: 24px;
            overflow-y: auto;
            border-right: 1px solid var(--border-glass);
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-cyan);
            margin-bottom: 16px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .component-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .component-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glass);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .component-card:hover {
            border-color: var(--accent-cyan);
            transform: translateX(4px);
            background: rgba(34, 211, 238, 0.1);
        }

        .component-card .name {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .component-card .tag {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        .tier-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(34, 211, 238, 0.2);
            color: var(--accent-cyan);
            border: 1px solid var(--accent-cyan);
        }

        /* Main Canvas */
        .canvas {
            display: flex;
            flex-direction: column;
            padding: 40px;
            position: relative;
        }

        .canvas-header {
            margin-bottom: 60px;
            text-align: center;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .construct-builder {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .chain-container {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 100px;
            border: 1px dashed var(--border-glass);
            min-width: 600px;
            min-height: 120px;
            transition: all 0.3s ease;
        }

        .chain-node {
            width: 100px;
            height: 100px;
            background: var(--card-bg);
            border: 2px solid var(--accent-cyan);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            text-align: center;
            padding: 10px;
            box-shadow: var(--glow-cyan);
            animation: nodePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @keyframes nodePop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .chain-node .node-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .node-connector {
            width: 40px;
            height: 2px;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-blue));
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        /* Right Panel - Stats & Export */
        .stats-panel {
            background: var(--bg-dark);
            padding: 24px;
            border-left: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .stat-group {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-cyan);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-blue));
            width: 0%;
            transition: width 0.5s ease;
        }

        .btn {
            background: var(--accent-cyan);
            color: var(--bg-dark);
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(34, 211, 238, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
        }

        /* In-Vivo Presets */
        .presets-bar {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 20px;
        }

        .preset-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            border-color: var(--accent-cyan);
            background: rgba(34, 211, 238, 0.1);
        }

        /* Terminal Output */
        .sequence-preview {
            background: #000;
            padding: 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #10b981;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #064e3b;
        }

        .empty-state {
            color: var(--text-dim);
            font-style: italic;
        }

        /* Transitions */
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>

                    <span>0bp</span>

            </div>

            <div class="stat-group">
                <div class="section-title">🔠 Sequence Stream</div>
                <div class="sequence-preview" id="sequence-output">
                    // Ready for synthesis...
                </div>
            </div>

            <button class="btn" onclick="exportConstruct()">
                <span>🚀 Generate Blueprint</span>
            </button>
            
            <button class="btn btn-outline" onclick="clearConstruct()">
                <span>🗑️ Clear Canvas</span>
            </button>
        </aside>
    </div>

                        const list = document.createElement('div');
                        list.className = 'component-list';
                        items.forEach(item => list.appendChild(createCard(item)));
                        section.appendChild(list);
                    }
                }
                container.appendChild(section);
            }
        }

        function createCard(item) {
            const card = document.createElement('div');
            card.className = 'component-card';
            card.innerHTML = `
                <div class="tier-badge">${item.tier}</div>
                <div class="name">${item.name}</div>
                <div class="tag">${item.id}</div>
            `;
            card.onclick = () => addComponent(item);
            return card;
        }


        function addComponent(item) {
            currentConstruct.push(item);
            updateUI();
        }

        function updateUI() {
            const chain = document.getElementById('construct-chain');
            chain.innerHTML = '';
            
            if (currentConstruct.length === 0) {
                chain.innerHTML = '<div class="empty-state">Select components to build your in-vivo construct...</div>';
            }

            currentConstruct.forEach((item, index) => {
                const node = document.createElement('div');
                node.className = 'chain-node';
                node.innerHTML = `
                    <div class="node-icon">${getIcon(item.id)}</div>
                    <div style="font-weight: 600;">${item.name}</div>
                    <div style="font-size: 0.5rem; opacity: 0.6;">${item.id}</div>
                `;
                node.onclick = () => removeComponent(index);
                chain.appendChild(node);

                if (index < currentConstruct.length - 1) {
                    const connector = document.createElement('div');
                    connector.className = 'node-connector';
                    chain.appendChild(connector);
                }
            });

            calculateStats();
        }

        function getIcon(id) {
            if (id.includes('SP')) return '🔘';
            if (id.includes('scFv')) return '🎯';
            if (id.includes('Hinge')) return '📏';
            if (id.includes('TM')) return '🧱';
            if (id.includes('cyto')) return '⚡';
            if (id.includes('Promoter')) return '🔋';
            if (id.includes('UTR')) return '🛡️';
            return '💎';
        }

        function removeComponent(index) {
            currentConstruct.splice(index, 1);
            updateUI();
        }

        function calculateStats() {
            let totalAA = 0;
            let fullSeq = '';

            currentConstruct.forEach(item => {
                totalAA += item.seq.length;
                fullSeq += `> ${item.id}\n${item.seq.substring(0, 40)}...\n\n`;
            });

            const dnaBp = totalAA * 3 + 150; // +150 for basic flanking

            document.getElementById('aa-length').innerText = totalAA.toLocaleString();
            document.getElementById('dna-length').innerText = dnaBp.toLocaleString();
            document.getElementById('sequence-output').innerText = fullSeq || '// Ready for synthesis...';

            const progress = (dnaBp / limit) * 100;
            const fill = document.getElementById('packaging-progress');
            fill.style.width = Math.min(progress, 100) + '%';
            
            if (progress > 90) fill.style.background = '#ef4444';
            else fill.style.background = 'linear-gradient(to right, var(--accent-cyan), var(--accent-blue))';
        }

        function loadPreset(type) {
            clearConstruct();
            if (type === 'CD5_LNP') {
                addComponent(LIBRARY_DATA["Signal Peptide"][0]);
                addComponent(LIBRARY_DATA["Antigen Binder"][1]); // CD19
                addComponent(LIBRARY_DATA["Hinge & Spacer"][0]);
                addComponent(LIBRARY_DATA["Transmembrane Domain"][0]);
                addComponent(LIBRARY_DATA["Costimulatory Domain"][0]);
                addComponent(LIBRARY_DATA["Primary Signaling Domain"][0]);
                addComponent(LIBRARY_DATA["Regulatory Element"][1]); // UTR
            } else if (type === 'CD3_mRNA') {
                addComponent(LIBRARY_DATA["Regulatory Element"][0]); // Promoter
                addComponent(LIBRARY_DATA["Signal Peptide"][0]);
                addComponent(LIBRARY_DATA["Antigen Binder"][0]); // OKT3
                addComponent(LIBRARY_DATA["Hinge & Spacer"][1]); // CD28
                addComponent(LIBRARY_DATA["Transmembrane Domain"][1]);
                addComponent(LIBRARY_DATA["Costimulatory Domain"][1]);
                addComponent(LIBRARY_DATA["Primary Signaling Domain"][0]);
                addComponent(LIBRARY_DATA["Regulatory Element"][1]);
            } else if (type === 'FAP_Invivo') {
                addComponent(LIBRARY_DATA["Signal Peptide"][0]);
                addComponent(LIBRARY_DATA["Antigen Binder"][2]); // Sibro
                addComponent(LIBRARY_DATA["Hinge & Spacer"][0]);
                addComponent(LIBRARY_DATA["Transmembrane Domain"][0]);
                addComponent(LIBRARY_DATA["Costimulatory Domain"][0]);
                addComponent(LIBRARY_DATA["Primary Signaling Domain"][0]);
            }
        }

        function clearConstruct() {
            currentConstruct = [];
            updateUI();
        }

        function exportConstruct() {
            if (currentConstruct.length === 0) {
                alert("Please add components first!");
                return;
            }
            alert("Generating Clinical Blueprint and Sequence YAML...");
            // Real export logic would go here
        }

        init();
    </script>
</body>
</html>
