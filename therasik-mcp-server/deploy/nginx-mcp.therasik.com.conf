# /etc/nginx/sites-available/mcp.therasik.com
# Port map:
#   8000 → abenginecore (InSynBio main API) — DO NOT TOUCH
#   8001 → therasik-mcp (TheraSIK Writing Suite)
#
# After DNS points mcp.therasik.com → this server, run:
#   certbot --nginx -d mcp.therasik.com
# Certbot will add the TLS block automatically.

server {
    listen 80;
    listen [::]:80;
    server_name mcp.therasik.com;

    # Let Certbot manage ACME challenges (needed before TLS upgrade)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Upstream: therasik-mcp.service on 8001 ───────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE: disable buffering, extend timeouts
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # CORS for Hermes / Cursor clients
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # Health check (no auth, no logging)
    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        access_log off;
    }

    # Block crawlers
    add_header X-Robots-Tag "noindex, nofollow" always;

    access_log /var/log/nginx/mcp.therasik.com.access.log;
    error_log  /var/log/nginx/mcp.therasik.com.error.log warn;
}
