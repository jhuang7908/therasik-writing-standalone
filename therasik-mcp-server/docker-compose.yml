version: "3.9"

# TheraSIK MCP Server — single-VPS production stack
# Deploy: git pull && docker compose up -d --build

services:

  # ── Core writing engine (FastAPI + fastmcp SSE) ─────────────────────────────
  engine:
    build: .
    container_name: therasik_engine
    restart: always
    environment:
      DATABASE_URL:    "postgresql://therasik:${POSTGRES_PASSWORD}@postgres:5432/therasik"
      REDIS_URL:       "redis://redis:6379"
      LT_URL:          "http://languagetool:8010/v2/check"
      GEMINI_API_KEY:  "${GEMINI_API_KEY}"
      JOURNAL_DB_DIR:  "/app/journal_db"
      SECRET_SALT:     "${SECRET_SALT}"
    volumes:
      - ./journal_db:/app/journal_db:ro   # proprietary journal JSONs — read-only
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      languagetool:
        condition: service_started
    expose:
      - "8000"

  # ── PostgreSQL (users / api_keys / usage_events) ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: therasik_postgres
    restart: always
    environment:
      POSTGRES_DB:       therasik
      POSTGRES_USER:     therasik
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U therasik"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis (rate limiting + result caching) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: therasik_redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data

  # ── LanguageTool (self-hosted, no 3rd-party text leaks) ────────────────────
  languagetool:
    image: erikvl87/languagetool
    container_name: therasik_lt
    restart: always
    mem_limit: 2g          # prevent OOM from taking down the engine
    environment:
      Java_Xms: 256m
      Java_Xmx: 1536m
    expose:
      - "8010"

  # ── Caddy (reverse proxy + automatic HTTPS) ─────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: therasik_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - engine

volumes:
  pgdata:       {}
  redisdata:    {}
  caddy_data:   {}
  caddy_config: {}
