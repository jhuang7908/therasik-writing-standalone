server {
    server_name studio.insynbio.com;
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/studio.insynbio.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/studio.insynbio.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = studio.insynbio.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name studio.insynbio.com;
    return 404; # managed by Certbot


}
