  # Below is a TYPICAL conflict example that may occur in real VHH sequences
  
  - type: "kabat_to_imgt_gap"
    description: "Typical VHH conflict: Kabat position 37 exists but IMGT 37 is a gap"
    example_site:
      site_id: "HALLMARK_VHH_37_CONFLICT_EXAMPLE"
      role: "hallmark"
      imgt_positions: []  # Gap in IMGT
      kabat_positions: [37]  # Exists in Kabat
      scope: [vhh]
      notes: "EXAMPLE: In some VHH structures, Kabat 37 maps to IMGT gap. This creates a numbering conflict."
    impact:
      - "Rules using IMGT:37 will not find the position"
      - "Rules using Kabat:37 will find it"
      - "Mutation plans must specify numbering scheme"
      - "Reports must document the conflict"
    resolution:
      - "Use IMGT as primary (per numbering.imgt.map requirement)"
      - "Map Kabat positions to IMGT when needed"
      - "Flag in numbering.dual_map_qc.conflicts"
      - "Document in report"

  - type: "position_mismatch"
    description: "Position sets don't match between IMGT and Kabat"
    example_site:
      site_id: "VERNIER_MISMATCH_EXAMPLE"
      role: "vernier"
      imgt_positions: [29, 30, 31]
      kabat_positions: [29, 30]  # Missing position 31
      scope: [vhh]
      notes: "EXAMPLE: IMGT has additional position not in Kabat numbering"
    impact:
      - "Site spans different number of positions in each scheme"
      - "Mutation targeting must account for scheme differences"
    resolution:
      - "Use IMGT positions as primary"
      - "Map Kabat positions when legacy rules require it"
      - "Document mismatch in site notes"

