<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1 - Cover | InSynBio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d9488;
            --primary-light: #14b8a6;
            --primary-dark: #0f766e;
            --bg: #ffffff;
            --text: #111827;
            --text-muted: #4b5563;
            --tea: #f0fdfa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            background: radial-gradient(circle at 80% 20%, var(--tea) 0%, #ffffff 100%);
        }

        /* Futuristic Background Elements */
        .bg-overlay {
            position: absolute;
            inset: 0;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        .neural-network {
            position: absolute;
            top: 0;
            right: 0;
            width: 60%;
            height: 100%;
            background-image: radial-gradient(var(--primary-light) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(to left, black, transparent);
            -webkit-mask-image: linear-gradient(to left, black, transparent);
        }

        .antibody-glow {
            position: absolute;
            right: 10%;
            top: 50%;
            transform: translateY(-50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(13, 148, 136, 0.15) 0%, transparent 70%);
            filter: blur(40px);
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            from { transform: translateY(-50%) scale(1); opacity: 0.5; }
            to { transform: translateY(-50%) scale(1.2); opacity: 0.8; }
        }

        /* Content Styles */
        .content {
            position: relative;
            z-index: 10;
            max-width: 800px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 60px;
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .logo-text span {
            color: var(--primary);
            font-style: italic;
        }

        .divider {
            width: 1px;
            height: 24px;
            background-color: #e5e7eb;
            margin: 0 4px;
        }

        .brand-subtitle {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 72px;
            line-height: 1.1;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 24px;
            letter-spacing: -0.03em;
        }

        .subtitle {
            font-size: 28px;
            color: var(--primary-dark);
            font-weight: 500;
            margin-bottom: 80px;
            opacity: 0.9;
        }

        .footer-info {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .dot {
            width: 4px;
            height: 4px;
            background-color: var(--primary);
            border-radius: 50%;
        }

        /* Decorative Line */
        .accent-line {
            position: absolute;
            bottom: 80px;
            left: 80px;
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), transparent);
            border-radius: 2px;
        }

        /* Antibody SVG Illustration */
        .antibody-svg {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            width: 450px;
            height: auto;
            z-index: 5;
            opacity: 0.9;
            filter: drop-shadow(0 0 20px rgba(13, 148, 136, 0.2));
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="bg-overlay">
            <div class="neural-network"></div>
            <div class="antibody-glow"></div>
        </div>

        <!-- Antibody Schematic SVG -->
        <svg class="antibody-svg" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Heavy Chain 1 -->
            <path d="M150 100 Q160 150 160 250 L160 450" stroke="#0d9488" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
            <!-- Heavy Chain 2 -->
            <path d="M250 100 Q240 150 240 250 L240 450" stroke="#0d9488" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
            <!-- Light Chain 1 -->
            <path d="M100 50 Q130 80 150 150" stroke="#14b8a6" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
            <!-- Light Chain 2 -->
            <path d="M300 50 Q270 80 250 150" stroke="#14b8a6" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
            
            <!-- Disulfide bonds -->
            <line x1="160" y1="280" x2="240" y2="280" stroke="#0d9488" stroke-width="2" stroke-dasharray="4 4"/>
            <line x1="160" y1="310" x2="240" y2="310" stroke="#0d9488" stroke-width="2" stroke-dasharray="4 4"/>
            
            <!-- Nodes/Molecules -->
            <circle cx="150" cy="100" r="6" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
            <circle cx="250" cy="100" r="6" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
            <circle cx="100" cy="50" r="6" fill="#ffffff" stroke="#14b8a6" stroke-width="2"/>
            <circle cx="300" cy="50" r="6" fill="#ffffff" stroke="#14b8a6" stroke-width="2"/>
            
            <!-- Neural connections overlay -->
            <path d="M350 150 L380 120 M350 200 L390 210 M360 280 L390 260" stroke="#0d9488" stroke-width="1" opacity="0.3"/>
            <circle cx="350" cy="150" r="3" fill="#0d9488" opacity="0.3"/>
            <circle cx="350" cy="200" r="3" fill="#0d9488" opacity="0.3"/>
            <circle cx="360" cy="280" r="3" fill="#0d9488" opacity="0.3"/>
        </svg>

        <div class="content">
            <div class="brand">
                <div class="logo-text">In<span>Syn</span>Bio</div>
                <div class="divider"></div>
                <div class="brand-subtitle">AI + Clinical Data + Expert Judgment</div>
            </div>

            <h1>AI-Assisted Biologics<br>R&D Risk Reduction</h1>
            <p class="subtitle">From Sequence to IND — Decision Before the Wet Lab</p>

            <div class="footer-info">
                <span>InSynBio</span>
            </div>
        </div>

        <div class="accent-line"></div>
    </div>
</body>
</html>
