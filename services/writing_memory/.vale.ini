# Vale configuration for InSynBio scientific writing service.
# Run from services/writing_memory/  →  vale <file.md>
# Or via Python API: see scripts/run_vale.py

StylesPath = vale_styles
MinAlertLevel = suggestion

# Vale's built-in vocabulary system — domain terms that should not be flagged.
Vocab = AbEngineCore

[*.{md,txt,qmd}]
BasedOnStyles = AbEngineCore
