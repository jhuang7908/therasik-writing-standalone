version: "3.8"

services:
  writing-memory:
    build: .
    image: insynbio/writing-memory:latest
    container_name: writing-memory
    restart: unless-stopped

    # Bind only to localhost; nginx terminates TLS in front of us.
    ports:
      - "127.0.0.1:8100:8100"

    env_file:
      - .env

    environment:
      # Quota knobs — override per-deployment without touching code
      WM_QUOTA_PLAN:   "2"
      WM_QUOTA_DRAFT:  "6"
      WM_QUOTA_POLISH: "10"
      WM_QUOTA_DB:     "/app/data/quota.db"
      # Trusted IPs are bypassed by quota (used for internal smoke tests)
      WM_TRUSTED_IPS:  "127.0.0.1,::1"

    volumes:
      # Persists quota counters, vector index, and ingest outputs.
      - ./data:/app/data
      - ./_index:/app/_index:ro

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
