# lab.insynbio.com → eLabFTW Docker (127.0.0.1:4430)
# Install: sudo cp nginx-lab.insynbio.com.example.conf /etc/nginx/sites-available/lab.insynbio.com
#          sudo ln -s /etc/nginx/sites-available/lab.insynbio.com /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d lab.insynbio.com
# DNS: A record lab.insynbio.com → VPS IP

server {
    listen 80;
    server_name lab.insynbio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lab.insynbio.com;

    ssl_certificate     /etc/letsencrypt/live/lab.insynbio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lab.insynbio.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 32m;

    location / {
        proxy_pass https://127.0.0.1:4430;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
