# Temporary HTTP-only vhost for lab.insynbio.com → eLabFTW (127.0.0.1:4430)
# Use before cert exists. After: certbot --nginx -d lab.insynbio.com
# Then enable nginx-lab.insynbio.com.example.conf (HTTPS).

server {
    listen 80;
    server_name lab.insynbio.com;

    client_max_body_size 32m;

    location / {
        proxy_pass https://127.0.0.1:4430;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }
}
