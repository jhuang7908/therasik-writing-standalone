name: US Life Hub — XHS + WeChat (Mon/Thu)

on:
  schedule:
    # Tue slot unused — Mon + Thu @ 09:30 America/New_York (after hub daily update)
    - cron: "30 13 * * 1,4"
    - cron: "30 14 * * 1,4"
  workflow_dispatch:
    inputs:
      force_images:
        description: "Force re-render WeChat images"
        required: false
        type: boolean
        default: false
      emails_only:
        description: "Resend email from cached social.json in output dir"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: uslifehub-wechat
  cancel-in-progress: false

jobs:
  wechat_delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout suite repository
        uses: actions/checkout@v4

      - name: Checkout insynbio-website (hub search index)
        uses: actions/checkout@v4
        with:
          repository: jhuang7908/insynbio-website
          ref: master
          path: insynbio-web-source
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg and CJK fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic openai google-genai Pillow requests pyyaml

      - name: Write .env file
        run: |
          mkdir -p content_generation_tools
          cat > content_generation_tools/.env << 'EOF'
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          USLIFEHUB_XHS_RECIPIENTS=christina600@gmail.com
          USLIFEHUB_WECHAT_RECIPIENTS=mail.jing.huang@gmail.com,1725490135@qq.com
          GMAIL_USER=mail.jing.huang@gmail.com
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          SMTP_HOST=mail.privateemail.com
          SMTP_PORT=465
          SMTP_USER=contact@therasik.com
          SMTP_PASSWORD=${{ secrets.INSYNBIO_SMTP_PASSWORD }}
          SMTP_FALLBACK_USER=contact@insynbio.com
          SMTP_SSL=true
          SMTP_TLS=false
          QQ_SMTP_PASSWORD=${{ secrets.QQ_SMTP_PASSWORD }}
          QQ_SMTP_USER=1725490135@qq.com
          EOF

      - name: DST slot gate (Mon/Thu 09:30 ET — scheduled only)
        id: slot
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SCHED="${{ github.event.schedule }}"
          TZ_ZONE=$(TZ=America/New_York date +%Z)
          DOW=$(TZ=America/New_York date +%u)
          RUN="false"
          if [[ "$DOW" == "1" || "$DOW" == "4" ]]; then
            if [[ "$TZ_ZONE" == "EDT" && "$SCHED" == "30 13 * * 1,4" ]]; then RUN="true"; fi
            if [[ "$TZ_ZONE" != "EDT" && "$SCHED" == "30 14 * * 1,4" ]]; then RUN="true"; fi
          fi
          echo "run=$RUN" >> "$GITHUB_OUTPUT"

      - name: Run XHS + WeChat delivery pipeline
        if: steps.slot.outputs.run == 'true'
        run: |
          EXTRA=""
          if [[ "${{ github.event.inputs.force_images }}" == "true" ]]; then
            EXTRA="--force-images"
          fi
          if [[ "${{ github.event.inputs.emails_only }}" == "true" ]]; then
            python scripts/uslifehub_wechat_weekly.py --emails-only
          else
            python scripts/uslifehub_wechat_weekly.py $EXTRA
          fi
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload delivery artifacts
        if: steps.slot.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: uslifehub-social-${{ github.run_id }}
          path: |
            outputs/uslifehub_social_**/social*.json
            outputs/uslifehub_social_**/social_images/xhs_*/
            outputs/uslifehub_social_**/social_images/wechat/
          retention-days: 30
