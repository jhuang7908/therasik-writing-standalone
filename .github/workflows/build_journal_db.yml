name: Build Journal Requirements Database

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max journals to process (0 = all ~5600)'
        required: false
        default: '0'
      delay:
        description: 'Delay between requests in seconds'
        required: false
        default: '1.0'

  # Run daily at 01:00 UTC — processes ~200 journals per run
  # At limit=200, completes all 10,453 journals in ~52 days
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: write

concurrency:
  group: journal-db-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run journal database builder
        run: |
          python scripts/build_journal_db.py \
            --limit ${{ github.event.inputs.limit || '200' }} \
            --delay ${{ github.event.inputs.delay || '1.0' }} \
            --verbose
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit results
        run: 'bash scripts/git_commit_push.sh "chore: update journal requirements database [skip ci]"'
