name: Scrape Journal Guidelines (Playwright)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max journals to process (0 = all with empty guidelines)'
        required: false
        default: '200'
      publisher:
        description: 'Filter by publisher (e.g. "Elsevier", "Wiley", "" = all)'
        required: false
        default: ''
      delay:
        description: 'Seconds between requests (be polite to servers)'
        required: false
        default: '0.25'
      workers:
        description: 'Parallel browser tabs'
        required: false
        default: '6'

  # Run daily at 03:00 UTC — 2 hours after build_journal_db finishes
  # Picks up journals that build_journal_db populated that day
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

concurrency:
  group: journal-guidelines-scrape
  cancel-in-progress: false

jobs:
  # ── Job 1: Journal-specific guidelines (Playwright) ───────────────────────
  scrape-journals:
    name: Scrape journal guidelines
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Scrape journal submission guidelines
        run: |
          python scripts/scrape_guidelines_playwright.py \
            --limit  "${{ github.event.inputs.limit  || '500' }}" \
            --publisher "${{ github.event.inputs.publisher || '' }}" \
            --delay  "${{ github.event.inputs.delay  || '0.25' }}" \
            --workers "${{ github.event.inputs.workers || '6' }}"
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated journal files
        run: bash scripts/git_commit_push.sh "chore: scrape journal submission guidelines (Playwright) [skip ci]"

  # ── Job 2: Platform-level submission guides ───────────────────────────────
  scrape-platforms:
    name: Scrape submission platform guides
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Scrape submission platform guides
        run: python scripts/scrape_platform_guides.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit platform guide files
        run: bash scripts/git_commit_push.sh "chore: update submission platform guides [skip ci]" "assets/submission_system_guides/"
