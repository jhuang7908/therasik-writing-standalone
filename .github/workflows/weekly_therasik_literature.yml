name: Weekly Therasik AI Drug Design Literature

on:
  schedule:
    # Tuesday 01:00 UTC = Beijing 09:00
    - cron: "0 1 * * 2"
  workflow_dispatch:
    inputs:
      replay_bundle:
        description: "Replay frozen bundle slug (skip PubMed). Empty = live PubMed pick."
        required: false
        default: ""
      send_mode:
        description: "full | emails_only | wechat_only"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - emails_only
          - wechat_only
      force_images:
        description: "Force re-render all social images"
        required: false
        default: false
        type: boolean

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg and CJK fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic openai google-genai Pillow requests pyyaml biopython pyyaml

      - name: Write .env file
        run: |
          mkdir -p content_generation_tools
          cat > content_generation_tools/.env << 'EOF'
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          ZHIPU_API_KEY=${{ secrets.ZHIPU_API_KEY }}
          NCBI_API_KEY=${{ secrets.NCBI_API_KEY }}
          NCBI_EMAIL=pipeline@therasik.com
          THERASIK_LITERATURE_RECIPIENTS=mail.jing.huang@gmail.com
          GMAIL_USER=mail.jing.huang@gmail.com
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          SMTP_HOST=mail.privateemail.com
          SMTP_PORT=465
          SMTP_USER=contact@therasik.com
          SMTP_PASSWORD=${{ secrets.INSYNBIO_SMTP_PASSWORD }}
          SMTP_FALLBACK_USER=contact@insynbio.com
          SMTP_SSL=true
          SMTP_TLS=false
          EOF

      - name: Run Therasik literature weekly pipeline
        run: |
          BUNDLE_ARG=""
          if [ -n "${{ github.event.inputs.replay_bundle }}" ]; then
            BUNDLE_ARG="--replay-bundle ${{ github.event.inputs.replay_bundle }}"
          fi
          MODE="${{ github.event.inputs.send_mode }}"
          if [ -z "$MODE" ]; then MODE="full"; fi
          FORCE=""
          if [ "${{ github.event.inputs.force_images }}" = "true" ]; then
            FORCE="--force-images"
          fi
          if [ "$MODE" = "wechat_only" ]; then
            python scripts/therasik_literature_weekly.py $BUNDLE_ARG --wechat-only $FORCE
          elif [ "$MODE" = "emails_only" ]; then
            python scripts/therasik_literature_weekly.py $BUNDLE_ARG --emails-only
          else
            python scripts/therasik_literature_weekly.py $BUNDLE_ARG $FORCE
          fi
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload XHS images artifact
        uses: actions/upload-artifact@v4
        with:
          name: therasik-xhs-${{ github.run_id }}
          path: outputs/therasik_literature_**/social_images/xhs/
          retention-days: 30

      - name: Upload WeChat images artifact
        uses: actions/upload-artifact@v4
        with:
          name: therasik-wechat-${{ github.run_id }}
          path: outputs/therasik_literature_**/social_images/wechat/
          retention-days: 30

      - name: Upload social JSON
        uses: actions/upload-artifact@v4
        with:
          name: therasik-social-json-${{ github.run_id }}
          path: outputs/therasik_literature_**/social.json
          retention-days: 30
