# /etc/nginx/sites-available/mcp.therasik.com
# Symlink to sites-enabled:
#   ln -s /etc/nginx/sites-available/mcp.therasik.com \
#          /etc/nginx/sites-enabled/mcp.therasik.com
#
# Port allocation:
#   8000 → abenginecore (InSynBio main API)  ← DO NOT TOUCH
#   8001 → therasik-mcp (TheraSIK Writing Suite)  ← this file
#
# TLS: managed by Certbot.  To obtain:
#   certbot --nginx -d mcp.therasik.com

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mcp.therasik.com;

    # Let Certbot manage the .well-known challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (SSE-capable) ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mcp.therasik.com;

    # TLS — Certbot will populate these lines automatically:
    # ssl_certificate     /etc/letsencrypt/live/mcp.therasik.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mcp.therasik.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "DENY"           always;
    add_header Referrer-Policy         "no-referrer"    always;
    add_header X-Robots-Tag            "noindex, nofollow" always;

    # ── CORS for Hermes / Cursor clients ─────────────────────────────────────
    # Adjust origin if front-end domain differs
    set $cors_origin "";
    if ($http_origin ~* "^https://(insynbio\.com|therasik\.com|app\.therasik\.com)$") {
        set $cors_origin $http_origin;
    }

    # ── SSE timeout — MCP clients keep the connection alive ──────────────────
    # Standard REST: 60 s; SSE streams: 1 h
    proxy_read_timeout     3600s;
    proxy_send_timeout     3600s;
    keepalive_timeout      3600s;

    # ── Upstream: therasik-mcp.service on 8001 ───────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE (disable buffering)
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;

        # CORS response headers
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-API-Key" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Preflight fast-path
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-API-Key" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Health check (no auth) ────────────────────────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        access_log off;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mcp.therasik.com.access.log;
    error_log  /var/log/nginx/mcp.therasik.com.error.log warn;
}
