version: "1.1.0"
name: insynbio-paper2ppt
extends: nature-paper2ppt
description: Hybrid paper-to-PPTX — editable python-pptx primary, optional gpt-image-2 heroes.

always_load:
  - ../../_shared/core/principles.md
  - ../../_shared/core/terminology-ledger.md
  - static/core/principles.md
  - static/core/toolchain.md
  - static/core/workflow.md
  - static/core/output-and-quality.md

axes:
  paper_type:
    detect: |
      discovery | methods | resource | clinical | materials | review — pick arc
      matching dominant argument (nature-paper2ppt parity).
    values:
      discovery: static/fragments/paper_type/discovery.md
      methods: static/fragments/paper_type/methods.md
      resource: static/fragments/paper_type/resource.md
      clinical: static/fragments/paper_type/clinical.md
      materials: static/fragments/paper_type/materials.md
      review: static/fragments/paper_type/review.md
    default: review
    multi: false

local_overlays:
  review_evidence_map: static/paper_types/review-evidence-map.md
  principles_legacy: static/core/principles-nature-adopted.md

toolchain:
  orchestrator: scripts/insynbio_research.py
  manuscript_to_slides: scripts/insynbio_manuscript_to_slides.py
  editable_primary: scripts/insynbio_paper2ppt.py
  plan_converter: content_generation_tools/ppt-templates/scripts/md_to_plan.py
  visual_optional: content_generation_tools/ppt-templates/scripts/generate_ppt.py
  styles: content_generation_tools/ppt-templates/styles/

references:
  on_demand:
    gpt_image_skill: ../../gpt-image2-ppt/SKILL.md
    deckweaver_editable: ../../deckweaver/SKILL.md
