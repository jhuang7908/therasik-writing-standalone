version: "1.1.0"
name: insynbio-paper-reader
extends: nature-reader

always_load:
  - ../../_shared/core/principles.md
  - ../../_shared/core/terminology-ledger.md
  - static/core/principles.md
  - static/core/workflow.md
  - static/core/output-contract.md

axes:
  source_format:
    detect: |
      pdf-text | scanned-pdf | html | doi-arxiv | pasted-text — load resolution
      fragment first when DOI resolves to PDF.
    values:
      pdf-text: static/fragments/source/pdf-text.md
      scanned-pdf: static/fragments/source/scanned-pdf.md
      html: static/fragments/source/html.md
      doi-arxiv: static/fragments/source/doi-arxiv.md
      pasted-text: static/fragments/source/pasted-text.md
    default: pdf-text
    multi: true

toolchain:
  cli: scripts/insynbio_paper_reader.py
  translation_platform: https://write.insynbio.com
  translate_providers: [kimi, deepseek]
