      The selected scaffold falls into a high-compatibility (low-tuning) class. Such scaffolds are repeatedly validated in therapeutic development, generally tolerant to diverse CDR combinations, and less dependent on extreme epitope geometry constraints. Based on the current sequence-to-scaffold similarity, we recommend a minimal back-mutation strategy: preserve human-framework consistency and apply conservative Vernier-related back-mutations only if functional drift or geometry risk signals emerge.

