    en: |
      The selected scaffold is a moderate-tuning class. These scaffolds are frequently used for conformational or angle-of-approach–sensitive epitopes, where FR–CDR coupling is stronger. We recommend a partitioned refinement strategy: lock key conformational positions in FR2/Vernier regions to avoid unnecessary substitutions, and apply limited optimizations to non-critical positions in FR1/FR3 to balance developability and functional fidelity.

  CLASS_III:
    cn: |
      （High-tuning / structure-coupled scaffold），paratope。，“”。“ + ”：、/；VernierCDR，。
    en: |
      The scaffold is a structure-coupled (high-tuning) class, where framework residues may contribute directly to paratope geometry. Wholesale framework-swap humanization is not recommended. We propose a localized humanization plus point back-mutation path: apply conservative substitutions only on surface, non-conformational positions with clear immunogenicity/stability benefits, and treat Vernier/CDR-supporting positions as locked unless supported by structural models or experimental evidence.

