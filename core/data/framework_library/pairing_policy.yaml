        allow_vl_switch_to:
          - "IGLV2-14"
        reason: "Mitigate aggregation/high-concentration formulation risk by allowing a λ framework option."
    TODO: {}

  discouraged_pairs:
    # Keep empty unless we have explicit evidence; do not infer.
    TODO:
      reason: "TODO (assembly/aggregation/charge/steric constraints)"
      pairs: []

  vh:
    allowed_families: "TODO"
