      canonical_class: "H2-4-1"
    notes: "VH4 alternative; envelope aligned."

  IGHV5-51*01:
    cdr_h1:
      length_mode: 5
      length_range: [4, 6]
      canonical_class: "H1-TODO"
    cdr_h2:
      length_mode: 17
      length_range: [16, 18]
      canonical_class: "H2-TODO"
    notes: "VH5 rare family; canonical taxonomy to be confirmed."


