# ============================================================
# Canonical Envelopes for Drug-grade Frameworks
# Purpose:
# - Bind each framework to its typical CDR1/2 (or L1/L2) length window + canonical class
# Hard rules:
# - Do NOT invent missing data; use TODO
# - CDR3 has NO canonical class (set policy elsewhere)
# - Framework = FR1–FR3 only (FR4 excluded)
# ============================================================

version: 1
naming_convention:
  heavy:
    cdr1_class_format: "H1-<class>"
    cdr2_class_format: "H2-<class>"
  light:
    cdr1_class_format: "L1-<class>"
    cdr2_class_format: "L2-<class>"

# ------------------------------------------------------------
# Heavy chain (VH) canonical envelopes
# ------------------------------------------------------------
vh:

  IGHV3-23*01:
    cdr_h1:
      length_mode: 5
      length_range: [4, 6]
      canonical_class: "H1-1"
    cdr_h2:
      length_mode: 17
      length_range: [16, 18]
      canonical_class: "H2-3-2"
    notes: "VH3 super scaffold; default envelope."

  IGHV3-7*01:
    cdr_h1:
      length_mode: 5
      length_range: [4, 6]
      canonical_class: "H1-1"
    cdr_h2:
      length_mode: 17
      length_range: [16, 18]
      canonical_class: "H2-3-2"
    notes: "Near-neighbor of 3-23; envelope aligned."

  IGHV3-11*01:
    cdr_h1:
      length_mode: 5
      length_range: [4, 6]
      canonical_class: "H1-1"
    cdr_h2:
      length_mode: 17
      length_range: [16, 18]
      canonical_class: "H2-3-2"
    notes: "Compact VH3; envelope aligned."

  IGHV3-21*01:
    cdr_h1:
      length_mode: 5
      length_range: [4, 7]
      canonical_class: "H1-TODO"   # you stated 1-3 in text; keep TODO until you lock taxonomy
    cdr_h2:
      length_mode: 17
      length_range: [16, 18]
      canonical_class: "H2-3-2"
    notes: "Distinct FR3 geometry; H1 class pending internal lock."

  IGHV1-46*01:
    cdr_h1:
      length_mode: 5
      length_range: [4, 6]
      canonical_class: "H1-2"
    cdr_h2:
      length_mode: 17
      length_range: [16, 18]
      canonical_class: "H2-2-1"
    notes: "VH1 reference envelope."

  IGHV1-2*01:
    cdr_h1:
      length_mode: 5
      length_range: [4, 6]
      canonical_class: "H1-2"
    cdr_h2:
      length_mode: 17
      length_range: [16, 18]
      canonical_class: "H2-2-1"
    notes: "VH1 envelope; class stable."

  IGHV1-69*01:
    cdr_h1:
      length_mode: 5
      length_range: [4, 6]
      canonical_class: "H1-2"
    cdr_h2:
      length_mode: 17
      length_range: [16, 18]
      canonical_class: "H2-2-1"
    notes: "VH1 envelope; hydrophobic tendency is separate from canonical."

  IGHV1-18*01:
    cdr_h1:
      length_mode: 5
      length_range: [4, 6]
      canonical_class: "H1-2"
    cdr_h2:
      length_mode: 17
      length_range: [16, 18]
      canonical_class: "H2-2-1"
    notes: "VH1 fallback; envelope assumed VH1-like."

  IGHV4-39*01:
    cdr_h1:
      length_mode: 6
      length_range: [5, 7]
      canonical_class: "H1-3"
    cdr_h2:
      length_mode: 17
      length_range: [16, 18]
      canonical_class: "H2-4-1"
    notes: "VH4 envelope; supports wider H3 space."

  IGHV4-59*01:
